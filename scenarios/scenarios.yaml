# Scenario Definitions for Dataverse MCP Server Evaluation
# Each scenario defines a prompt, expected tools, and success criteria.

scenarios:
  # ──────────────────────────────────────────────
  # CRUD Lifecycle (Scenarios 1-5)
  # ──────────────────────────────────────────────

  - id: create-table
    name: "Create table"
    stage: setup
    prompt: >
      Create a table called EvalProjects with the following columns:
      Name (text, required), Status (text), and DueDate (datetime).
    expected_tools:
      - create_table
    expected_tool_params:
      tablename_contains: "EvalProjects"
    success_criteria:
      - "The agent should call the 'create_table' tool"
      - "The table name should contain 'EvalProjects'"
      - "The agent should confirm the table was created"

  - id: create-record
    name: "Create record"
    stage: setup
    depends_on: create-table
    prompt: >
      Create a record in the crb16_evalprojects table with these values:
      crb16_name: 'MCP Eval Test', crb16_status: 'Active', crb16_duedate: '2026-12-31'.
      Use the create_record tool directly with tablename 'crb16_evalprojects'.
    expected_tools:
      - create_record
    expected_tool_params:
      tablename_contains: "evalprojects"
    expected_response_contains:
      - "created"
    success_criteria:
      - "The agent should call the 'create_record' tool"
      - "The agent should confirm the record was created successfully"

  - id: fetch-record
    name: "Fetch record"
    stage: verify
    depends_on: create-record
    prompt: >
      Query the crb16_evalprojects table for the record where crb16_name equals
      'MCP Eval Test'. Return all fields including crb16_status and crb16_duedate.
      Use the read_query tool with SQL like: SELECT crb16_name, crb16_status, crb16_duedate FROM crb16_evalprojects WHERE crb16_name = 'MCP Eval Test'
    expected_tools:
      - read_query
    acceptable_tools:
      - fetch
      - describe
    expected_response_contains:
      - "MCP Eval Test"
    success_criteria:
      - "The response should contain 'MCP Eval Test'"
      - "The agent should return record details"

  - id: delete-record
    name: "Delete record"
    stage: teardown
    depends_on: create-record
    prompt: >
      Query the crb16_evalprojects table for the record where crb16_name equals
      'MCP Eval Test' using read_query, then delete that record using delete_record.
      The table logical name is crb16_evalprojects. I approve the deletion.
    expected_tools:
      - delete_record
    acceptable_tools:
      - read_query
      - search_records
    success_criteria:
      - "The agent should call the 'delete_record' tool"
      - "The agent should confirm the record was deleted"

  - id: delete-table
    name: "Delete table"
    stage: teardown
    depends_on: delete-record
    prompt: >
      Delete the table with logical name 'crb16_evalprojects' from Dataverse.
      Use the delete_table tool directly with tablename 'crb16_evalprojects'.
      I confirm and approve the deletion — set hasUserApproved to true.
    expected_tools:
      - delete_table
    success_criteria:
      - "The agent should call the 'delete_table' tool"
      - "The agent should confirm the table was deleted"

  # ──────────────────────────────────────────────
  # Search & List (Scenarios 6-9)
  # ──────────────────────────────────────────────

  - id: list-tables
    name: "List all tables"
    stage: verify
    prompt: >
      List all tables in Dataverse.
    expected_tools:
      - list_tables
    acceptable_tools:
      - describe
      - search
    expected_response_contains:
      - "account"
    success_criteria:
      - "The response should contain table names"
      - "The response should include 'account'"

  - id: search-generic
    name: "Search (search tool)"
    stage: verify
    prompt: >
      Search for account tables in Dataverse.
    expected_tools:
      - search
    expected_response_contains:
      - "account"
    success_criteria:
      - "The agent should call the 'search' tool"
      - "The results should contain 'account'"

  - id: search-records
    name: "Search records (search_data tool)"
    stage: verify
    prompt: >
      Find all accounts in Dataverse and return their names.
    expected_tools:
      - search
    acceptable_tools:
      - read_query
      - search_records
    success_criteria:
      - "The agent should call a search or query tool"
      - "The agent should return results or indicate no data found"

  - id: create-table-and-search
    name: "Create table + search"
    stage: verify
    depends_on: create-table
    prompt: >
      Search for the EvalProjects table in Dataverse and verify it exists.
    expected_tools:
      - search
    acceptable_tools:
      - list_tables
      - describe
    expected_response_contains:
      - "evalprojects"
    success_criteria:
      - "The response should show 'EvalProjects' exists"

  # ──────────────────────────────────────────────
  # Skills (Scenarios 10-13)
  # ──────────────────────────────────────────────

  - id: create-skill
    name: "Create skill"
    stage: setup
    prompt: >
      Create a skill called 'EvalJokeTeller' that tells a funny joke
      about Copilot when invoked. The skill description should be
      'Tells a joke about GitHub Copilot'.
    expected_tools:
      - upsert_skill
    acceptable_tools:
      - create_record
    expected_tool_params:
      skill_name: "EvalJokeTeller"
    success_criteria:
      - "The agent should create a skill"
      - "The skill should be named 'EvalJokeTeller'"
      - "The agent should confirm the skill was created"

  - id: list-skills
    name: "List all skills"
    stage: verify
    depends_on: create-skill
    prompt: >
      List all skills available in Dataverse.
    expected_tools:
      - list_tables
    acceptable_tools:
      - describe
      - search
    success_criteria:
      - "The agent should list or search for skills"
      - "The response should include skill entries"

  - id: follow-skill
    name: "Follow a skill"
    stage: verify
    depends_on: create-skill
    prompt: >
      Look up the skill named 'EvalJokeTeller' using the describe tool
      at path 'skills/EvalJokeTeller', then tell me a joke about Copilot
      based on that skill.
    expected_tools: []
    acceptable_tools:
      - describe
      - search
    success_criteria:
      - "The response should contain a joke about 'Copilot'"

  - id: delete-skill
    name: "Delete skill"
    stage: teardown
    depends_on: create-skill
    prompt: >
      Delete the skill named 'EvalJokeTeller' from Dataverse.
    expected_tools:
      - delete_skill
    acceptable_tools:
      - delete_record
    success_criteria:
      - "The agent should delete the skill"
      - "The agent should confirm the skill was deleted"
